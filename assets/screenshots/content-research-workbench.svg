<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI 内容需求研究工作台模拟截图</title>
  <desc id="desc">展示从用户问题到需求洞察、选题评分和脚本草稿的流程。</desc>
  <rect width="1200" height="720" fill="#f7f8fb"/>
  <rect x="52" y="44" width="1096" height="76" rx="8" fill="#223047"/>
  <text x="82" y="92" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">AI 内容需求研究工作台</text>
  <text x="860" y="92" fill="#c8d2e4" font-family="Arial, sans-serif" font-size="16">research -> topic -> script</text>

  <rect x="52" y="154" width="330" height="480" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="80" y="194" fill="#18202f" font-family="Arial, sans-serif" font-size="22" font-weight="700">样例输入</text>
  <text x="80" y="238" fill="#566176" font-family="Arial, sans-serif" font-size="17">用户问题</text>
  <foreignObject x="80" y="258" width="260" height="110">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:18px;line-height:1.45;color:#18202f;">收藏了很多 AI 工具，但不知道怎么真正用到业务流程里。</div>
  </foreignObject>
  <text x="80" y="420" fill="#566176" font-family="Arial, sans-serif" font-size="17">项目观察</text>
  <foreignObject x="80" y="440" width="260" height="130">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:18px;line-height:1.45;color:#18202f;">重复 3 次以上的工作，值得拆成输入、判断、输出和验收。</div>
  </foreignObject>

  <rect x="434" y="154" width="330" height="480" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="462" y="194" fill="#18202f" font-family="Arial, sans-serif" font-size="22" font-weight="700">需求洞察</text>
  <rect x="462" y="228" width="250" height="64" rx="6" fill="#eef6ff"/>
  <text x="484" y="266" fill="#1a5fb4" font-family="Arial, sans-serif" font-size="18" font-weight="700">不是缺工具</text>
  <rect x="462" y="314" width="250" height="64" rx="6" fill="#eef8f0"/>
  <text x="484" y="352" fill="#188038" font-family="Arial, sans-serif" font-size="18" font-weight="700">缺业务翻译</text>
  <rect x="462" y="400" width="250" height="64" rx="6" fill="#fff7e8"/>
  <text x="484" y="438" fill="#b06000" font-family="Arial, sans-serif" font-size="18" font-weight="700">缺验收标准</text>
  <foreignObject x="462" y="500" width="252" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:17px;line-height:1.45;color:#566176;">AI 负责整理和初稿，人负责判断、表达和发布。</div>
  </foreignObject>

  <rect x="816" y="154" width="332" height="480" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="844" y="194" fill="#18202f" font-family="Arial, sans-serif" font-size="22" font-weight="700">选题输出</text>
  <text x="844" y="248" fill="#18202f" font-family="Arial, sans-serif" font-size="19" font-weight="700">别再收藏 AI 工具了</text>
  <text x="844" y="280" fill="#566176" font-family="Arial, sans-serif" font-size="17">先自动化一个重复工作</text>
  <rect x="844" y="320" width="234" height="22" rx="11" fill="#dbeafe"/>
  <rect x="844" y="320" width="205" height="22" rx="11" fill="#3b82f6"/>
  <text x="844" y="374" fill="#18202f" font-family="Arial, sans-serif" font-size="18">综合评分：4.55 / 5</text>
  <foreignObject x="844" y="416" width="250" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:17px;line-height:1.45;color:#18202f;">开头：真正让你变强的不是工具数量，而是你能不能把重复工作说清楚。</div>
  </foreignObject>
  <text x="844" y="590" fill="#7a8496" font-family="Arial, sans-serif" font-size="14">公开演示截图：内容为重写样例，不含真实评论原文。</text>
</svg>
