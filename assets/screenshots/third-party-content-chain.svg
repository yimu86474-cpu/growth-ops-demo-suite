<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">第三方内容对标改写全链路模拟截图</title>
  <desc id="desc">使用 synthetic data 展示第三方内容候选、转写、拆解、沉淀和改写。</desc>
  <rect width="1200" height="720" fill="#f7f8fb"/>
  <rect x="52" y="44" width="1096" height="76" rx="8" fill="#223047"/>
  <text x="82" y="92" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="700">第三方内容对标改写全链路</text>
  <text x="818" y="92" fill="#c8d2e4" font-family="Arial, sans-serif" font-size="16">capture -> transcript -> decompose -> remix</text>

  <rect x="52" y="150" width="250" height="470" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="78" y="190" fill="#18202f" font-family="Arial, sans-serif" font-size="21" font-weight="700">候选抓取</text>
  <text x="78" y="235" fill="#566176" font-family="Arial, sans-serif" font-size="16">douyin_demo</text>
  <foreignObject x="78" y="258" width="190" height="118">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:17px;line-height:1.45;color:#18202f;">别再收藏 AI 工具了，先把重复工作变成流程。</div>
  </foreignObject>
  <rect x="78" y="420" width="150" height="30" rx="15" fill="#dcfce7"/>
  <text x="96" y="441" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">deep_decompose</text>
  <text x="78" y="510" fill="#7a8496" font-family="Arial, sans-serif" font-size="14">synthetic metadata</text>

  <rect x="330" y="150" width="250" height="470" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="356" y="190" fill="#18202f" font-family="Arial, sans-serif" font-size="21" font-weight="700">转写与准入</text>
  <rect x="356" y="226" width="176" height="32" rx="6" fill="#eef6ff"/>
  <text x="374" y="248" fill="#1a5fb4" font-family="Arial, sans-serif" font-size="15" font-weight="700">demo-small transcript</text>
  <text x="356" y="306" fill="#18202f" font-family="Arial, sans-serif" font-size="17">样本准入卡</text>
  <text x="356" y="342" fill="#566176" font-family="Arial, sans-serif" font-size="15">why_worth / why_not</text>
  <text x="356" y="386" fill="#566176" font-family="Arial, sans-serif" font-size="15">不搬运原句</text>
  <text x="356" y="430" fill="#566176" font-family="Arial, sans-serif" font-size="15">低风险可深拆</text>

  <rect x="608" y="150" width="250" height="470" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="634" y="190" fill="#18202f" font-family="Arial, sans-serif" font-size="21" font-weight="700">编导拆解</text>
  <text x="634" y="238" fill="#566176" font-family="Arial, sans-serif" font-size="16">1. 样本准入</text>
  <text x="634" y="276" fill="#566176" font-family="Arial, sans-serif" font-size="16">2. 整体结构</text>
  <text x="634" y="314" fill="#566176" font-family="Arial, sans-serif" font-size="16">3. 逐句功能</text>
  <text x="634" y="352" fill="#566176" font-family="Arial, sans-serif" font-size="16">4. 心理路径</text>
  <text x="634" y="390" fill="#566176" font-family="Arial, sans-serif" font-size="16">5. 表达技巧</text>
  <text x="634" y="428" fill="#566176" font-family="Arial, sans-serif" font-size="16">6. 转化设计</text>
  <text x="634" y="466" fill="#566176" font-family="Arial, sans-serif" font-size="16">7. 复用模板</text>
  <rect x="634" y="520" width="142" height="30" rx="15" fill="#fff7e8"/>
  <text x="654" y="541" fill="#b06000" font-family="Arial, sans-serif" font-size="15" font-weight="700">score 4.60</text>

  <rect x="886" y="150" width="262" height="470" rx="8" fill="#ffffff" stroke="#dfe4ee"/>
  <text x="912" y="190" fill="#18202f" font-family="Arial, sans-serif" font-size="21" font-weight="700">沉淀与改写</text>
  <text x="912" y="242" fill="#18202f" font-family="Arial, sans-serif" font-size="17">reuse-assets.md</text>
  <text x="912" y="282" fill="#18202f" font-family="Arial, sans-serif" font-size="17">kb-sync-plan.md</text>
  <text x="912" y="322" fill="#18202f" font-family="Arial, sans-serif" font-size="17">rewrite-brief.md</text>
  <text x="912" y="362" fill="#18202f" font-family="Arial, sans-serif" font-size="17">script-package.md</text>
  <foreignObject x="912" y="420" width="190" height="90">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Arial,sans-serif;font-size:16px;line-height:1.45;color:#566176;">只迁移结构和方法，替换成木易自己的项目证据。</div>
  </foreignObject>
  <text x="912" y="570" fill="#7a8496" font-family="Arial, sans-serif" font-size="14">公开演示截图：不含真实平台内容。</text>
</svg>
